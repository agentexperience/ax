# Keep HTML fresh while allowing CDN stale-while-revalidate for faster repeat visits.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

# Cache Astro's fingerprinted build assets aggressively at browser and CDN layers.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Cache static media and font assets for one year when file names change on updates.
